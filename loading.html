<!DOCTYPE html>
<html {{ HTML_ATTRS }}>
    <head {{ HEAD_ATTRS }}>
        {{ HEAD }}
        <style>
            #nuxt-loading {
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                display: flex;
                z-index: 9999;
                position: fixed;
                align-items: center;
                flex-direction: column;
                justify-content: center;
                transition: opacity 0.5s;
                background-color: #262E57; /* Hardcoded primary brand color */
            }
            #nuxt-loading img {
                width: 8rem;
                height: 6rem;
                margin: 1rem 0;
            }
            #nuxt-loading h1 {
                margin: 0;
                color: white;
                font-weight: 900;
                font-family: 'Archivo', sans-serif;
            }
            .fade-out {
                opacity: 0;
            }
        </style>
    </head>
    <body {{ BODY_ATTRS }}>
        <div id="nuxt-loading">
            <img src="/images/logo.white.png" alt="Olympsis logo" onerror="this.style.display='none'">
            <h1>OLYMPSIS</h1>
        </div>
        {{ APP }}
    </body>
</html>
